<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-ETS 시뮬레이터 공식 시각화</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #e2e8f0;
            /* 캡처하기 좋은 회색 배경 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .formula-card {
            background-color: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            width: 800px;
            padding: 40px;
            border: 1px solid #f1f5f9;
        }

        .math-symbol {
            color: #94a3b8;
            font-size: 1.5rem;
            font-weight: 900;
        }

        .block-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 16px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            flex: 1;
            text-align: center;
            position: relative;
        }

        .block-result {
            background-color: #0f172a;
            color: white;
            border: none;
        }

        .badge {
            position: absolute;
            top: -10px;
            background-color: #10b77f;
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 9999px;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>

    <div class="formula-card space-y-10">

        <!-- Formula 1 -->
        <div>
            <h3 class="text-xl font-black text-slate-800 mb-5 flex items-center gap-2">
                <span
                    class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-sm">1</span>
                해외 예상 비용 (유로화 실시간 환산)
            </h3>

            <div class="flex items-center gap-3">
                <!-- Block 1 -->
                <div class="block-item">
                    <span class="text-2xl mb-1">🏭</span>
                    <span class="text-sm font-bold text-slate-700">해외 배출량</span>
                    <span class="text-[10px] text-slate-400 font-mono mt-1">tCO₂e</span>
                </div>

                <div class="math-symbol">×</div>

                <!-- Block 2 -->
                <div class="block-item border-emerald-100 bg-emerald-50">
                    <div class="badge bg-emerald-500">LIVE</div>
                    <span class="text-2xl mb-1 mt-1">🇪🇺</span>
                    <span class="text-sm font-bold text-emerald-800">EU-ETS 선물가</span>
                    <span class="text-[10px] text-emerald-600 font-mono mt-1">EUR (€)</span>
                </div>

                <div class="math-symbol">×</div>

                <!-- Block 3 -->
                <div class="block-item border-blue-100 bg-blue-50">
                    <div class="badge bg-blue-500">LIVE</div>
                    <span class="text-2xl mb-1 mt-1">💱</span>
                    <span class="text-sm font-bold text-blue-800">유로/원 환율</span>
                    <span class="text-[10px] text-blue-600 font-mono mt-1">EUR/KRW</span>
                </div>

                <div class="math-symbol">=</div>

                <!-- Result Block -->
                <div class="block-item block-result shadow-lg shadow-blue-900/20">
                    <span class="text-lg font-black text-white">해외 총 비용</span>
                    <span class="text-xs text-emerald-400 font-bold mt-1">100% 원화(₩) 환산</span>
                </div>
            </div>
        </div>

        <div class="w-full h-px bg-slate-100"></div>

        <!-- Formula 2 -->
        <div>
            <h3 class="text-xl font-black text-slate-800 mb-5 flex items-center gap-2">
                <span
                    class="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-sm">2</span>
                글로벌 통합 리스크 판정
            </h3>

            <div class="flex items-center gap-3">
                <!-- Block 1 -->
                <div class="block-item">
                    <span class="text-sm font-bold text-slate-700">🇰🇷 국내 (K-ETS)</span>
                    <span class="text-[11px] text-slate-500 mt-1">예상 비용 (₩)</span>
                </div>

                <div class="math-symbol">+</div>

                <!-- Block 2 -->
                <div class="block-item">
                    <span class="text-sm font-bold text-slate-700">🇪🇺 해외 (EU-ETS)</span>
                    <span class="text-[11px] text-slate-500 mt-1">예상 비용 (₩)</span>
                </div>

                <div class="math-symbol">➡️</div>

                <!-- Block 3 -->
                <div class="block-item bg-slate-800 text-white border-none flex-2">
                    <span class="text-sm font-bold text-slate-200 mb-1">글로벌 통합 총비용</span>
                    <div class="w-full h-1 bg-slate-600 rounded-full my-2 overflow-hidden">
                        <div class="h-full bg-emerald-400" style="width: 65%;"></div>
                    </div>
                    <span class="text-[10px] text-slate-400">vs 연간 탄소 예산 (BUDGET)</span>
                </div>

                <div class="math-symbol">➡️</div>

                <!-- Result Block -->
                <div class="block-item border-emerald-500 bg-emerald-50 h-full flex justify-center">
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
                        <span class="text-base font-black text-emerald-700 tracking-wide">SAFE</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
